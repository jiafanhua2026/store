server:
  port: 8080

spring:
  application:
    name: nvzhuang
  datasource:
    url: jdbc:h2:mem:nvzhuang;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.nvzhuang: DEBUG
    org.hibernate.SQL: DEBUG

nvzhuang:
  company-name: 等你服饰